services:

  # ── FastAPI app ──────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # 'redis' here is the service name below — Docker resolves it automatically
      REDIS_URL: redis://redis:6379
    volumes:
      # Live-reload: mounts your source code into the container so you don't
      # have to rebuild on every change. Remove in production.
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - campus-dt-net

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"   # exposes Redis to your host machine too (optional)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - campus-dt-net

networks:
  campus-dt-net:
    driver: bridge
